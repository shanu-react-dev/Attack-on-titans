<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Marriage Form</h1>
    <form>
      <label for="fullName">Full Name</label>
      <input
        type="text"
        placeholder="Enter your name"
        name="fullName"
        id="fullName"
        required
      />
      <br /><br />

      <label for="age">Enter age:</label>
      <input
        type="number"
        placeholder="age"
        name="age"
        id="age"
        min="20"
        max="30"
        required
      />

      <br /><br />
      <label for="job">Select your profession field:</label>
      <select name="job" id="job" required>
        <option value=""></option>
        <option value="IT">Information Technology</option>
        <option value="ME">Mechanical Engineer</option>
        <option value="Civil Services">Govt. Job</option>
        <option value="Armed Forces">Armed Forces</option>
      </select>

      <br /><br />
      <label for="dob">Select Date of Birth</label>
      <input
        type="date"
        name="dob"
        id="dob"
        min="2002-01-01"
        max="2005-12-31"
        required
      />

      <br /><br />
      <label for="image">Upload your image</label>
      <input type="file" name="image" id="image" accept=".jpeg" required />

      <br /><br />
      <label for="biodata">Upload your CV or Biodata</label>
      <input type="file" name="biodata" id="biodata" accept=".pdf" required />

      <br /><br />
      <label for="medical certificate">Medical certificate</label>
      <input
        type="file"
        name="medical certificate"
        id="medical certificate"
        accept=".pdf"
      />

      <br /><br />
      <label for="gender">Gender</label>
      <input type="radio" name="gender" id="male" value="male" />
      <label for="male">Male</label>
      <input type="radio" name="gender" id="female" value="female" />
      <label for="female">Female</label>
      <input type="radio" name="gender" id="others" value="others" />
      <label for="others">Others</label>

      <br /><br />
      <label for="skills">Skills:</label>
      <input type="checkbox" name="skills" id="cooking" value="cooking" />
      <label for="cooking">Cooking</label>
      <input type="checkbox" name="skills" id="driving" value="driving" />
      <label for="driving">Driving</label>

      <button type="submit">Submit Data</button>
    </form>
  </body>
</html>
